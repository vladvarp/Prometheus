<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка доступа</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00aaff;
    --warn: #ff6b35;
    --danger: #ff2d55;
    --muted: #4a4a6a;
    --text: #e0e0f0;
    --text-dim: #6a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { margin-bottom: 32px; }

  .label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .label::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  /* ── IP Info Block ── */
  .ip-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
    margin-bottom: 0;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    animation: cardIn 0.5s ease both;
  }

  @media (max-width: 480px) {
    .ip-block { grid-template-columns: 1fr; }
  }

  .ip-field {}

  .ip-field-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .ip-field-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent2);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 22px;
  }

  .ip-field-value.loading {
    color: var(--muted);
    font-size: 11px;
    animation: blink 0.8s ease-in-out infinite alternate;
  }

  .flag {
    font-size: 18px;
    line-height: 1;
  }

  .ip-extra {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* ── Offline banner ── */
  .offline-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(255,45,85,0.08);
    border: 1px solid var(--danger);
    font-size: 11px;
    color: var(--danger);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .offline-banner.visible { display: flex; }

  /* ── PWA install banner ── */
  .install-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(0,170,255,0.07);
    border: 1px solid var(--accent2);
    font-size: 11px;
    color: var(--accent2);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .install-banner.visible { display: flex; }

  .install-btn {
    background: var(--accent2);
    color: var(--bg);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s;
  }

  .install-btn:hover { opacity: 0.85; }

  /* Scan button */
  .scan-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .scan-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .scan-btn:hover::before { transform: translateX(0); }
  .scan-btn:hover { color: var(--bg); }
  .scan-btn span { position: relative; z-index: 1; }

  .scan-btn .icon {
    width: 16px;
    height: 16px;
    position: relative;
    z-index: 1;
    transition: transform 0.4s;
  }

  .scan-btn.scanning .icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 32px;
    min-height: 40px;
    transition: border-color 0.3s;
  }

  .status-bar.ok { border-left-color: var(--accent); color: var(--accent); }
  .status-bar.scanning { border-left-color: var(--accent2); color: var(--accent2); }
  .status-bar.error { border-left-color: var(--danger); color: var(--danger); }

  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .status-bar.scanning .pulse { animation: blink 0.6s ease-in-out infinite alternate; }
  @keyframes blink { to { opacity: 0.2; } }

  /* Cards */
  .cards { display: grid; gap: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 16px;
    transition: border-color 0.3s, transform 0.2s;
    animation: cardIn 0.4s ease both;
  }

  .card:hover { border-color: var(--muted); transform: translateX(4px); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    margin-bottom: 3px;
  }

  .card-url { font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; }
  .card-status { text-align: right; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid;
    white-space: nowrap;
  }

  .badge.idle    { border-color: var(--muted);   color: var(--muted); }
  .badge.checking{ border-color: var(--accent2); color: var(--accent2); }
  .badge.online  { border-color: var(--accent);  color: var(--accent);  background: rgba(0,255,136,0.05); }
  .badge.offline { border-color: var(--danger);  color: var(--danger);  background: rgba(255,45,85,0.05); }

  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .badge.checking .badge-dot { animation: blink 0.5s ease-in-out infinite alternate; }

  .card-latency { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

  /* Summary */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 32px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .stat {
    text-align: center;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-num.online { color: var(--accent); }
  .stat-num.offline { color: var(--danger); }
  .stat-num.total { color: var(--text); }

  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; }

  footer {
    margin-top: 48px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .last-check { color: var(--text-dim); margin-top: 4px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="label">Koko$ Network Monitor</div>
    <h1>🥥 Проверка<br><span>🏝️ доступа</span></h1>

  </header>

  <button class="scan-btn" id="scanBtn" onclick="runScan()">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="8" cy="8" r="6"/>
      <path d="M8 2v2M8 12v2M2 8h2M12 8h2"/>
    </svg>
    <span id="btnText">Запустить проверку</span>
  </button>

  <div class="status-bar" id="statusBar">
    <div class="pulse"></div>
    <span id="statusText">Ожидание запуска...</span>
  </div>

  <div class="cards" id="cards"></div>

  <div class="summary" id="summary" style="display:none">
    <div class="stat">
      <div class="stat-num online" id="sumOnline">0</div>
      <div class="stat-label">Доступно</div>
    </div>
    <div class="stat">
      <div class="stat-num offline" id="sumOffline">0</div>
      <div class="stat-label">Недоступно</div>
    </div>
    <div class="stat">
      <div class="stat-num total" id="sumTotal">0</div>
      <div class="stat-label">Всего</div>
    </div>
  </div>



  <!-- IP Info -->
  <div class="ip-block" id="ipBlock">
    <div class="ip-field">
      <div class="ip-field-label">Ваш IP-адрес</div>
      <div class="ip-field-value loading" id="ipValue">загрузка...</div>
    </div>
    <div class="ip-field">
      <div class="ip-field-label">Страна / Регион</div>
      <div class="ip-field-value loading" id="countryValue">загрузка...</div>
      <div class="ip-extra" id="ispValue"></div>
    </div>
  </div>

  <!-- Offline banner -->
  <div class="offline-banner" id="offlineBanner">
    <span>⚠</span>
    <span>Нет подключения к интернету — страница загружена из кеша</span>
  </div>

  <!-- PWA install banner -->
  <div class="install-banner" id="installBanner">
    <span>📲 Установить приложение на рабочий стол</span>
    <button class="install-btn" id="installBtn">Установить</button>
  </div>

  <footer>
    Проверка выполняется через ваш браузер и сеть<br>
    <span class="last-check" id="lastCheck"></span>
  </footer>

</div>

<script>
/* ── Sites ── */
const SITES = [
  { name: 'VK',         url: 'vk.com',         icon: '▶️',  probe: 'https://www.vk.com/favicon.ico' },
  { name: 'YouTube',    url: 'youtube.com',    icon: '📺',  probe: 'https://www.youtube.com/generate_204' },
  { name: 'Telegram',   url: 'telegram.org',   icon: '✈️',   probe: 'https://telegram.org/favicon.ico' },
  { name: 'WhatsApp',   url: 'whatsapp.com',   icon: '💬',  probe: 'https://www.whatsapp.com/favicon.ico' },
  { name: 'Instagram',  url: 'instagram.com',  icon: '📸',  probe: 'https://www.instagram.com/favicon.ico' }, 
  { name: 'Facebook',   url: 'facebook.com',   icon: '🗺️',  probe: 'https://www.facebook.com/favicon.ico' }, 
  { name: 'Google',     url: 'google.com',     icon: '🌐',   probe: 'https://www.google.com/generate_204' },
  { name: 'Cloudflare', url: 'cloudflare.com', icon: '☁️',   probe: 'https://www.cloudflare.com/favicon.ico' },
];

let scanning = false;

/* ── Service Worker registration ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ── Online/offline banner ── */
function updateOnlineStatus() {
  document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

/* ── PWA install prompt ── */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('visible');
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted') {
    document.getElementById('installBanner').classList.remove('visible');
  }
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('visible');
});

/* ── IP & Country ── */
async function loadIPInfo() {
  const ipEl      = document.getElementById('ipValue');
  const countryEl = document.getElementById('countryValue');
  const ispEl     = document.getElementById('ispValue');

  // Try multiple public CORS-friendly APIs in order
  const apis = [
    // IPv4-only endpoints (принудительно возвращают IPv4)
    async () => {
      const r = await fetch('https://api4.ipify.org?format=json', { signal: AbortSignal.timeout(6000) });
      const { ip } = await r.json();
      if (!ip) throw new Error('no ip');
      // Получаем геоданные отдельно
      const g = await fetch(`https://ipapi.co/${ip}/json/`, { signal: AbortSignal.timeout(6000) });
      const d = await g.json();
      return { ip, country: d.country_name, countryCode: d.country_code, city: d.city, region: d.region, org: d.org };
    },
    async () => {
      const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(8000) });
      const d = await r.json();
      if (!d.ip) throw new Error('no ip');
      return { ip: d.ip, country: d.country_name, countryCode: d.country_code, city: d.city, region: d.region, org: d.org };
    },
    async () => {
      const r = await fetch('https://ipwho.is/', { signal: AbortSignal.timeout(8000) });
      const d = await r.json();
      if (!d.success) throw new Error('fail');
      return { ip: d.ip, country: d.country, countryCode: d.country_code, city: d.city, region: d.region, org: d.connection?.isp || '' };
    },
  ];

  let data = null;
  for (const api of apis) {
    try { data = await api(); break; } catch {}
  }

  if (data) {
    ipEl.classList.remove('loading');
    // Определяем тип адреса
    const isV6 = data.ip.includes(':');
    ipEl.innerHTML = `${data.ip} <span style="font-size:9px;color:var(--text-dim);border:1px solid var(--muted);padding:1px 5px;margin-left:4px">${isV6 ? 'IPv6' : 'IPv4'}</span>`;

    countryEl.classList.remove('loading');
    const flag = codeToFlag(data.countryCode);
    countryEl.innerHTML = `${flag ? '<span class="flag">' + flag + '</span>' : ''}${data.country || '—'}`;

    const parts = [data.city, data.region].filter(Boolean);
    ispEl.textContent = parts.join(', ') + (data.org ? ' · ' + data.org : '');
  } else {
    ipEl.classList.remove('loading');
    ipEl.textContent = 'Нет данных';
    ipEl.style.color = 'var(--muted)';
    countryEl.classList.remove('loading');
    countryEl.textContent = 'Нет соединения';
    countryEl.style.color = 'var(--muted)';
  }
}

/* Convert ISO 3166-1 alpha-2 country code to flag emoji */
function codeToFlag(code) {
  if (!code || code.length !== 2) return '';
  return [...code.toUpperCase()].map(c => String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))).join('');
}

loadIPInfo();

/* ── Card rendering ── */
function renderCards(statuses) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  SITES.forEach((site, i) => {
    const s = statuses[i] || { status: 'idle', latency: null };
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 60}ms`;
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-icon">${site.icon}</div>
      <div class="card-info">
        <div class="card-name">${site.name}</div>
        <div class="card-url">${site.url}</div>
      </div>
      <div class="card-status">${badgeFor(s.status, s.latency)}</div>
    `;
    container.appendChild(card);
  });
}

function badgeFor(status, latency) {
  const labels = { idle: 'Ожидание', checking: 'Проверка', online: 'Доступен', offline: 'Недоступен' };
  const latencyHtml = (status === 'online' && latency !== null)
    ? `<div class="card-latency">${latency} мс</div>` : '';
  return `<span class="badge ${status}"><span class="badge-dot"></span>${labels[status] || status}</span>${latencyHtml}`;
}

function updateCard(index, status, latency) {
  const card = document.getElementById(`card-${index}`);
  if (card) card.querySelector('.card-status').innerHTML = badgeFor(status, latency);
}

/* ── Site check ── */
async function checkSite(site) {
  const t0 = performance.now();
  const strategies = [
    () => fetch(site.probe, { method: 'HEAD', mode: 'no-cors', cache: 'no-store', signal: AbortSignal.timeout(8000) }),
    () => new Promise((res, rej) => {
      const img = new Image();
      const timer = setTimeout(() => { img.src = ''; rej(new Error('timeout')); }, 8000);
      img.onload = img.onerror = () => { clearTimeout(timer); res(); };
      img.src = site.probe + '?_=' + Date.now();
    }),
  ];
  for (const strategy of strategies) {
    try {
      await strategy();
      return { status: 'online', latency: Math.round(performance.now() - t0) };
    } catch { return { status: 'offline', latency: null }; }
  }
  return { status: 'offline', latency: null };
}

/* ── Scan ── */
async function runScan() {
  if (scanning) return;
  scanning = true;

  const btn       = document.getElementById('scanBtn');
  const btnText   = document.getElementById('btnText');
  const statusBar = document.getElementById('statusBar');
  const statusText= document.getElementById('statusText');
  const summary   = document.getElementById('summary');

  btn.classList.add('scanning');
  btnText.textContent = 'Проверка...';
  btn.disabled = true;
  statusBar.className = 'status-bar scanning';
  statusText.textContent = 'Инициализация проверки...';
  summary.style.display = 'none';

  renderCards(SITES.map(() => ({ status: 'idle', latency: null })));
  await new Promise(r => setTimeout(r, 200));

  let done = 0;
  const results = new Array(SITES.length);

  await Promise.all(SITES.map(async (site, i) => {
    await new Promise(r => setTimeout(r, i * 150));
    updateCard(i, 'checking', null);
    statusText.textContent = `Проверяю ${site.name}...`;
    const result = await checkSite(site);
    results[i] = result;
    done++;
    updateCard(i, result.status, result.latency);
    statusText.textContent = `Проверено ${done} из ${SITES.length}...`;
  }));

  const online  = results.filter(r => r.status === 'online').length;
  const offline = results.filter(r => r.status === 'offline').length;

  document.getElementById('sumOnline').textContent  = online;
  document.getElementById('sumOffline').textContent = offline;
  document.getElementById('sumTotal').textContent   = SITES.length;
  summary.style.display = 'grid';

  if (offline === 0) {
    statusBar.className = 'status-bar ok';
    statusText.textContent = `Все ${SITES.length} сайтов доступны`;
  } else if (online === 0) {
    statusBar.className = 'status-bar error';
    statusText.textContent = `Все сайты недоступны — возможны проблемы с сетью`;
  } else {
    statusBar.className = 'status-bar error';
    statusText.textContent = `${offline} из ${SITES.length} сайтов недоступны`;
  }

  const now = new Date();
  document.getElementById('lastCheck').textContent =
    `Последняя проверка: ${now.toLocaleTimeString('ru-RU')} — ${now.toLocaleDateString('ru-RU')}`;

  btn.classList.remove('scanning');
  btnText.textContent = 'Повторить проверку';
  btn.disabled = false;
  scanning = false;
}

renderCards(SITES.map(() => ({ status: 'idle' })));
</script>
</body>
</html>
