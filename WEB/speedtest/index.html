<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка доступности сайтов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #00aaff;
    --warn: #ff6b35;
    --danger: #ff2d55;
    --muted: #4a4a6a;
    --text: #e0e0f0;
    --text-dim: #6a6a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .label::before {
    content: '';
    width: 20px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 12px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  /* Scan button */
  .scan-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .scan-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 0;
  }

  .scan-btn:hover::before { transform: translateX(0); }
  .scan-btn:hover { color: var(--bg); }
  .scan-btn span { position: relative; z-index: 1; }

  .scan-btn .icon {
    width: 16px;
    height: 16px;
    position: relative;
    z-index: 1;
    transition: transform 0.4s;
  }

  .scan-btn.scanning .icon {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 32px;
    min-height: 40px;
    transition: border-color 0.3s;
  }

  .status-bar.ok { border-left-color: var(--accent); color: var(--accent); }
  .status-bar.scanning { border-left-color: var(--accent2); color: var(--accent2); }
  .status-bar.error { border-left-color: var(--danger); color: var(--danger); }

  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .status-bar.scanning .pulse {
    animation: blink 0.6s ease-in-out infinite alternate;
  }

  @keyframes blink { to { opacity: 0.2; } }

  /* Cards grid */
  .cards {
    display: grid;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 16px;
    transition: border-color 0.3s, transform 0.2s;
    animation: cardIn 0.4s ease both;
  }

  .card:hover { border-color: var(--muted); transform: translateX(4px); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .card-info {}

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    margin-bottom: 3px;
  }

  .card-url {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .card-status {
    text-align: right;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 1px solid;
    white-space: nowrap;
  }

  .badge.idle { border-color: var(--muted); color: var(--muted); }
  .badge.checking { border-color: var(--accent2); color: var(--accent2); }
  .badge.online { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.05); }
  .badge.offline { border-color: var(--danger); color: var(--danger); background: rgba(255,45,85,0.05); }
  .badge.partial { border-color: var(--warn); color: var(--warn); background: rgba(255,107,53,0.05); }

  .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .badge.checking .badge-dot { animation: blink 0.5s ease-in-out infinite alternate; }

  .card-latency {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Summary */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 32px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .stat {
    text-align: center;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-num.online { color: var(--accent); }
  .stat-num.offline { color: var(--danger); }
  .stat-num.total { color: var(--text); }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Footer */
  footer {
    margin-top: 48px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .last-check {
    color: var(--text-dim);
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">Network Monitor</div>
    <h1>Проверка<br><span>доступности</span></h1>
    <p class="subtitle">Тест выполняется с вашего устройства — результаты отражают реальную доступность сайтов в вашей сети</p>
  </header>

  <button class="scan-btn" id="scanBtn" onclick="runScan()">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="8" cy="8" r="6"/>
      <path d="M8 2v2M8 12v2M2 8h2M12 8h2"/>
    </svg>
    <span id="btnText">Запустить проверку</span>
  </button>

  <div class="status-bar" id="statusBar">
    <div class="pulse"></div>
    <span id="statusText">Ожидание запуска...</span>
  </div>

  <div class="cards" id="cards"></div>

  <div class="summary" id="summary" style="display:none">
    <div class="stat">
      <div class="stat-num online" id="sumOnline">0</div>
      <div class="stat-label">Доступно</div>
    </div>
    <div class="stat">
      <div class="stat-num offline" id="sumOffline">0</div>
      <div class="stat-label">Недоступно</div>
    </div>
    <div class="stat">
      <div class="stat-num total" id="sumTotal">0</div>
      <div class="stat-label">Всего</div>
    </div>
  </div>

  <footer>
    Проверка выполняется через ваш браузер и сеть<br>
    <span class="last-check" id="lastCheck"></span>
  </footer>
</div>

<script>
const SITES = [
  { name: 'YouTube',    url: 'https://www.youtube.com',         icon: '▶',  probe: 'https://www.youtube.com/generate_204' },
  { name: 'Telegram',   url: 'https://telegram.org',            icon: '✈',  probe: 'https://telegram.org/favicon.ico' },
  { name: 'WhatsApp',   url: 'https://www.whatsapp.com',        icon: '💬', probe: 'https://www.whatsapp.com/favicon.ico' },
  { name: 'Google',     url: 'https://www.google.com',          icon: '◉',  probe: 'https://www.google.com/generate_204' },
  { name: 'Cloudflare', url: 'https://www.cloudflare.com',      icon: '☁',  probe: 'https://www.cloudflare.com/favicon.ico' },
];

let scanning = false;

function renderCards(statuses) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  SITES.forEach((site, i) => {
    const s = statuses[i] || { status: 'idle', latency: null };
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 60}ms`;
    card.id = `card-${i}`;

    let badgeHtml = '';
    let latencyHtml = '';

    if (s.status === 'idle') {
      badgeHtml = `<span class="badge idle"><span class="badge-dot"></span>Ожидание</span>`;
    } else if (s.status === 'checking') {
      badgeHtml = `<span class="badge checking"><span class="badge-dot"></span>Проверка</span>`;
    } else if (s.status === 'online') {
      badgeHtml = `<span class="badge online"><span class="badge-dot"></span>Доступен</span>`;
      if (s.latency !== null) latencyHtml = `<div class="card-latency">${s.latency} мс</div>`;
    } else if (s.status === 'offline') {
      badgeHtml = `<span class="badge offline"><span class="badge-dot"></span>Недоступен</span>`;
    }

    card.innerHTML = `
      <div class="card-icon">${site.icon}</div>
      <div class="card-info">
        <div class="card-name">${site.name}</div>
        <div class="card-url">${site.url}</div>
      </div>
      <div class="card-status">
        ${badgeHtml}
        ${latencyHtml}
      </div>
    `;
    container.appendChild(card);
  });
}

function updateCard(index, status, latency) {
  const card = document.getElementById(`card-${index}`);
  if (!card) return;
  const site = SITES[index];
  let badgeHtml = '';
  let latencyHtml = '';

  if (status === 'checking') {
    badgeHtml = `<span class="badge checking"><span class="badge-dot"></span>Проверка</span>`;
  } else if (status === 'online') {
    badgeHtml = `<span class="badge online"><span class="badge-dot"></span>Доступен</span>`;
    if (latency !== null) latencyHtml = `<div class="card-latency">${latency} мс</div>`;
  } else if (status === 'offline') {
    badgeHtml = `<span class="badge offline"><span class="badge-dot"></span>Недоступен</span>`;
  }

  card.querySelector('.card-status').innerHTML = badgeHtml + latencyHtml;
}

async function checkSite(site) {
  const t0 = performance.now();
  // Try multiple strategies
  const strategies = [
    // Strategy 1: fetch no-cors (won't throw on network block, but will on DNS/TCP fail)
    () => fetch(site.probe, {
      method: 'HEAD',
      mode: 'no-cors',
      cache: 'no-store',
      signal: AbortSignal.timeout(8000)
    }),
    // Strategy 2: img probe
    () => new Promise((res, rej) => {
      const img = new Image();
      const timer = setTimeout(() => { img.src = ''; rej(new Error('timeout')); }, 8000);
      img.onload = img.onerror = () => { clearTimeout(timer); res(); };
      img.src = site.probe + '?_=' + Date.now();
    }),
  ];

  for (const strategy of strategies) {
    try {
      await strategy();
      const latency = Math.round(performance.now() - t0);
      return { status: 'online', latency };
    } catch (e) {
      if (e.name === 'AbortError' || e.message === 'timeout') {
        return { status: 'offline', latency: null };
      }
      // Network error = offline
      return { status: 'offline', latency: null };
    }
  }
  return { status: 'offline', latency: null };
}

async function runScan() {
  if (scanning) return;
  scanning = true;

  const btn = document.getElementById('scanBtn');
  const btnText = document.getElementById('btnText');
  const statusBar = document.getElementById('statusBar');
  const statusText = document.getElementById('statusText');
  const summary = document.getElementById('summary');

  btn.classList.add('scanning');
  btnText.textContent = 'Проверка...';
  btn.disabled = true;

  statusBar.className = 'status-bar scanning';
  statusText.textContent = 'Инициализация проверки...';

  summary.style.display = 'none';

  // Init all cards as idle first, then checking
  const statuses = SITES.map(() => ({ status: 'idle', latency: null }));
  renderCards(statuses);

  await new Promise(r => setTimeout(r, 200));

  // Check all in parallel, update UI as each resolves
  let done = 0;
  const results = new Array(SITES.length);

  const promises = SITES.map(async (site, i) => {
    // Small stagger
    await new Promise(r => setTimeout(r, i * 150));
    updateCard(i, 'checking', null);
    statusText.textContent = `Проверяю ${site.name}...`;

    const result = await checkSite(site);
    results[i] = result;
    done++;
    updateCard(i, result.status, result.latency);
    statusText.textContent = `Проверено ${done} из ${SITES.length}...`;
  });

  await Promise.all(promises);

  // Summary
  const online = results.filter(r => r.status === 'online').length;
  const offline = results.filter(r => r.status === 'offline').length;

  document.getElementById('sumOnline').textContent = online;
  document.getElementById('sumOffline').textContent = offline;
  document.getElementById('sumTotal').textContent = SITES.length;
  summary.style.display = 'grid';

  // Status bar final
  if (offline === 0) {
    statusBar.className = 'status-bar ok';
    statusText.textContent = `Все ${SITES.length} сайтов доступны`;
  } else if (online === 0) {
    statusBar.className = 'status-bar error';
    statusText.textContent = `Все сайты недоступны — возможны проблемы с сетью`;
  } else {
    statusBar.className = 'status-bar error';
    statusText.textContent = `${offline} из ${SITES.length} сайтов недоступны`;
  }

  const now = new Date();
  document.getElementById('lastCheck').textContent =
    `Последняя проверка: ${now.toLocaleTimeString('ru-RU')} — ${now.toLocaleDateString('ru-RU')}`;

  btn.classList.remove('scanning');
  btnText.textContent = 'Повторить проверку';
  btn.disabled = false;
  scanning = false;
}

// Init cards on load
renderCards(SITES.map(() => ({ status: 'idle' })));
</script>
</body>
</html>
