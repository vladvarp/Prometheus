<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная страница</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #111827);
      color: #ffffff;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      margin-bottom: 20px;
    }
    .links-container {
      display: grid;
      gap: 20px;
      margin-top: 40px;
    }
    .link-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s ease;
    }
    .link-item:hover {
      transform: translateY(-5px);
      border-color: rgba(59,130,246,0.6);
    }
    .link-item a {
      text-decoration: none;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      display: block;
      padding: 10px;
    }
    .link-item a:hover {
      color: #3b82f6;
    }
    .link-item p {
      margin: 5px 0 0 0;
      color: #cfcfcf;
      font-size: 18px;
    }
    .fullscreen-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s ease;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }
    .fullscreen-btn:hover {
      background: rgba(59,130,246,0.3);
      border-color: rgba(59,130,246,0.6);
    }
  </style>
</head>
<body>
  <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим">⛶</button>
  <div class="container">
    <h1>Добро пожаловать в проект Prometheus!</h1>
    
    <div class="links-container">
     
      <div class="link-item">
        <a href="SOLIST.html">Публичные Подписки</a>
      </div>
      
      <div class="link-item">
        <a href="MTProtoInfo.html">MTProto Proxy</a>
      </div>

      <div class="link-item">
        <a href="speedtest/index.html">Проверка доступа</a>
      </div>    

      <div class="link-item">
        <a href="INFO.html">Страница информации</a>
      </div>    

    </div>
  </div>
  <script>
    const btn = document.getElementById('fullscreenBtn');
    const FS_KEY = 'prometheus_fullscreen';

    function enterFS() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }
    function exitFS() {
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }

    btn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        localStorage.setItem(FS_KEY, '1');
        enterFS();
      } else {
        localStorage.removeItem(FS_KEY);
        exitFS();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      btn.textContent = document.fullscreenElement ? '✕' : '⛶';
      btn.title = document.fullscreenElement ? 'Выйти из полноэкранного режима' : 'Полноэкранный режим';
    });

    // Скрыть кнопку на iOS — Fullscreen API не поддерживается для страниц
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isIOS) {
      btn.style.display = 'none';
    } else if (localStorage.getItem(FS_KEY) === '1') {
      enterFS();
    }
  </script>
</body>
</html>
