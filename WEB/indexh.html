<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Главная страница</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #111827);
      color: #ffffff;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      margin-bottom: 20px;
    }
    .links-container {
      display: grid;
      gap: 20px;
      margin-top: 40px;
    }
    .link-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s ease;
    }
    .link-item:hover {
      transform: translateY(-5px);
      border-color: rgba(59,130,246,0.6);
    }
    .link-item a {
      text-decoration: none;
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      display: block;
      padding: 10px;
    }
    .link-item a:hover {
      color: #3b82f6;
    }
    .link-item p {
      margin: 5px 0 0 0;
      color: #cfcfcf;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Добро пожаловать в проект Prometheus!</h1>
    
    <div class="links-container">
      <div class="link-item">
        <a href="INFO.html">Страница информации</a>
        <p>Просмотр информации о проекте</p>
      </div>
      
      <div class="link-item">
        <a href="SOLIST.html">Публичные VPN Подписки</a>
        <p>Информация о публичных VPN подписках</p>
      </div>
      
      <div class="link-item">
        <a href="MTProtoInfo.html">Информация о MTProto</a>
        <p>Узнайте больше о MTProto прокси и подключитесь к ним</p>
      </div>
    </div>
  </div>
</body>
</html>
